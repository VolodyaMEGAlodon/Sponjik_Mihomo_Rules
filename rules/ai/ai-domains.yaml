# =============================================================================
# ai-domains.yaml — explicit AI domain override (mihomo classical rule-set)
# =============================================================================
# Self-contained list to complement the auto-updating geosite categories.
# Wire up with:
#     rule-providers:
#       ai-domains-extra: { type: file, behavior: classical, format: yaml, path: ./ai-domains.yaml }
#     rules:
#       - RULE-SET,ai-domains-extra,AI     # <- replace AI with your proxy / proxy-group
#
# Confidence: [multi] = present in >=2 independent sources; [single] = one source.
# Generic infra (cloudflare, stripe, auth0, sentry, segment, akamai, azure blob
# fronts, etc.) was deliberately excluded to keep matches precise.
# =============================================================================
