# =============================================================================
# ai-process.yaml — AI / neural-net apps by PROCESS-NAME (mihomo classical set)
# =============================================================================
# Wire up in your config with:
#     rule-providers:
#       ai-process: { type: file, behavior: classical, format: yaml, path: ./ai-process.yaml }
#     rules:
#       - RULE-SET,ai-process,AI          # <- replace AI with your proxy / proxy-group
#
# PROCESS-NAME semantics differ per OS (this is where most lists go wrong):
#   Windows  -> executable basename WITH .exe, matching is CASE-INSENSITIVE
#   macOS    -> Mach-O executable name (CFBundleExecutable), CASE-SENSITIVE,
#               NOT the bundle id and NOT the .app display name
#   Android  -> app package name (ClashMetaForAndroid resolves uid -> package)
# Names with spaces are kept literal (only the first comma is the delimiter).
# Confidence tags:
#   [✓ MSIX]  AppxManifest Executable=      [✓ MSI]  MSI File table
#   [✓ unpack] installer extracted (no run) [✓ scoop] Scoop bin/shortcuts
#   [✓ meta]  binary VersionInfo            [✓ docs] vendor docs
#   [✓ winget] winget manifest              [✓ local] this-machine scan/live proc
#   [inferred] strong evidence, not pinned -> verify if critical
# =============================================================================
